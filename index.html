<!doctype html>
<html lang="en">
  <head>
    <title>Cat Quiz</title>
    <meta charset="UTF-8" />
    <link rel="stylesheet" type="text/css" href="style.css" />
  </head>
  <body>
    <br />
    <h1>Cat Quiz</h1>
    <br />
    <p>Hi there, welcome to the Cat Quiz! Please press start to begin.</p>

      onmouseover="this.style.backgroundColor = '#e0d0f0'"
      onmouseout="this.style.backgroundColor = '#f5edfc'"
    >
      START
    </button>
    <div id="quiz-container" style="display: none"></div>
  </body>
</html>
